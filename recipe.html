<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recipe Paradise</title>
    <link rel="stylesheet" href="recipe.css">
</head>
<body style="background-color: rgb(207, 251, 251);">


<button class="create_account_btn" id = "openModalCreateBtn">Create Account</button>

<div id="myCreateModal" class = "modalCreate">       
    <div class="modal-content">
        <span class="close" id="closeModalCreateBtn">&times;</span>
        <h2>Please fill out the below sections</h2>
        <form id="createAccountForm">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required><br>

            <button type="submit">Create Account</button>
        </form>
    </div>
</div>

<button class="login_btn" id = "openModalLoginBtn">Login</button>

<div id="myLoginModal" class = "modalLogin">
    <div class="modal-content">
        <span class="close" id="closeModalLoginBtn">&times;</span>
        <h2>Please fill out the below sections</h2>
        <form id="loginForm">
            <label for="username">Username:</label>
            <input type="text" id="loginUsername" name="username" placeholder="Enter username" required>

            <label for="password">Password:</label>
            <input type="password" id="loginPassword" name="password" placeholder="Enter password" required><br>

            <button type="submit">Login</button>
        </form>
    </div>
</div>

<h1 style="color: #ff6b6b;"> 
        <p style="font-size: 60px; font-family: 'Arial', sans-serif; text-align: center;">
            🍴Recipe Paradise🍴
        </p> 
</h1>

<div>
    <p style = "text-align: center; font-size: 20px; font-family: 'Arial', sans-serif;">
        <label for="title">Search for your favorite recipe!</label><br>
  <input type = "text" id = "name_search" placeholder = "Name of recipe" style = "width: 25%;"><br>
  <button type = "submit" onclick="displayRecipes()">Search</button>
    </p>
</div>

<div>
    <p style = "text-align: center; font-size: 20px; font-family: 'Arial', sans-serif;">
       <label for="ingredients"> Search by ingredients!</label><br>
  <input type = "text" id = "ingredient_search" placeholder = "Ingredients" style = "width: 25%;"><br>
  <button type = "submit" onclick="displayRecipes()">Search</button>
    </p>
</div>

<div>
    <p style = "text-align: center; font-size: 20px; font-family: 'Arial', sans-serif;">
<label for="category">Choose category:</label><br>
  <select name="category" id="category_search" style = "width: 15%; height: 25px; font-size: 15px;">
    <option value="" selected>Category</option>
    <option value="Japanese">Japanese</option>
    <option value="Chinese">Chinese</option>
    <option value="Western">Western</option>
    <option value="soup">Soup</option>
    <option value="dessert">Dessert</option>
    <option value="others">Others</option>
  </select>
    <button type = "submit" onclick="displayRecipes()">Search</button>
    </p>
</div>


<button class="open_btn" id ="openModalBtn">Add a recipe</button>

    <!-- Modal Structure -->
<div id="myModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeModalBtn">&times;</span>
        <h2>Please fill out the below sections</h2>
        <form id="submissionForm">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" placeholder="Enter recipe name" required>

            <label for="category">Category:</label>
            <input type="text" id="category" name="category" placeholder="Enter recipe category" required>

            <label for="ingredients">Ingredients:</label>
            <textarea id="ingredients" name="ingredients" placeholder="List ingredients (separate by commas)" required></textarea>

            <label for="instructions">Instructions:</label>
            <textarea id="instructions" name="instructions" rows="4" placeholder="Provide step-by-step instructions" required></textarea>

            <label for="URL">Image URL:</label>
            <input type="text" id="URL" name="URL" placeholder="Paste image URL" required>

            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </div>
</div>


 <section class="recipes-section" style="position: absolute; top: 85%; left: 35%;">
        <h2 style="text-align: center;">Recipes</h2>
        <div id="recipe-list">
            <!-- Recipes will be dynamically added here -->
        </div>
</section>

<img src="https://blog.sakura.co/wp-content/uploads/2022/04/shutterstock_1964618155-1.png" alt="Recipe Image" class="top-right">
<img src="https://cdn.shopify.com/s/files/1/0353/5621/files/masterclass_blog.png?v=1693303348" alt="Recipe Image" class="middle-right">
<img src="https://media.istockphoto.com/id/1442417585/photo/person-getting-a-piece-of-cheesy-pepperoni-pizza.jpg?s=612x612&w=0&k=20&c=k60TjxKIOIxJpd4F4yLMVjsniB4W1BpEV4Mi_nb4uJU=" alt="Recipe Image" class="bottom-right">

 <script src="recipe.js"></script>
</body>
</html>
